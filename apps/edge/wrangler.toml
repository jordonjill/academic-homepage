name = "academic-homepage-api"
main = "src/index.ts"
compatibility_date = "2026-04-16"
workers_dev = false
preview_urls = false

[ai]
binding = "AI"

[vars]
SITE_ORIGIN = "https://home.jihd.net"
LLM_MOCK_MODE = "false"
LLM_STREAM_DELAY_MS = "18"

[[kv_namespaces]]
binding = "PROFILE_KV"
id = "cb467bb0830645e58e9087fab7ef8e99"

[[vectorize]]
binding = "CANONICAL_INDEX"
index_name = "academic-homepage-questions"

[[d1_databases]]
binding = "DB"
database_name = "academic-homepage"
database_id = "07f1c149-3e52-4927-81aa-e595d7c1bce9"
